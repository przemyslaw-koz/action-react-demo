name: Events Demo 1
on:
  pull_request:
    types:
      - opened
    branches:
      - main
      - 'dev-*' # dev-new, dev-test, dev-current-work-etc
      - 'feat/**' # feat/new-work, feat/you/can/add/multiple/slashes/with/two/asterixes
  workflow_dispatch:
  push:
    branches:
      - main
      - 'dev-*' # dev-new, dev-test, dev-current-work-etc
      - 'feat/**' # feat/new-work, feat/you/can/add/multiple/slashes/with/two/asterixes
    paths-ignore:
      - '.github/workflows/*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy project
        run: echo "Deploying ..."
